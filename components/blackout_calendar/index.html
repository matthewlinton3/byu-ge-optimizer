<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 12px;
    background: #fff;
    color: #222;
    min-height: 100%;
  }

  #cal {
    display: grid;
    grid-template-columns: 52px repeat(5, 1fr);
    border-left: 1px solid #ccc;
    border-top: 1px solid #ccc;
    user-select: none;
    -webkit-user-select: none;
    width: 100%;
  }

  .hdr {
    background: #f0f2f6;
    border-right: 1px solid #ccc;
    border-bottom: 1px solid #ccc;
    text-align: center;
    font-weight: 700;
    color: #333;
    padding: 6px 2px;
    font-size: 12px;
  }

  .time-lbl {
    border-right: 1px solid #ccc;
    border-bottom: 1px solid #ddd;
    color: #777;
    font-size: 10px;
    padding: 2px 4px;
    text-align: right;
    background: #f8f9fa;
    line-height: 22px;
    height: 24px;
  }

  .cell {
    height: 24px;
    border-right: 1px solid #ddd;
    border-bottom: 1px solid #ddd;
    cursor: pointer;
    background: #fff;
  }

  .cell.hour-start {
    border-bottom-color: #bbb;
  }
  .time-lbl.hour-start {
    border-bottom-color: #bbb;
    font-weight: 700;
    color: #444;
    font-size: 11px;
  }

  .cell.blocked {
    background: #002E5D;
  }
  .cell:hover:not(.blocked) {
    background: #dbeafe;
  }
  .cell.blocked:hover {
    background: #003f82;
  }

  #footer {
    display: flex;
    gap: 8px;
    align-items: center;
    padding: 8px 0 4px 0;
    flex-wrap: wrap;
    background: #fff;
  }

  .legend {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: #555;
  }
  .legend-swatch {
    width: 14px; height: 14px;
    border: 1px solid #bbb;
    border-radius: 2px;
    display: inline-block;
    flex-shrink: 0;
  }
  .legend-swatch.blocked { background: #002E5D; border-color: #002E5D; }
  .legend-swatch.free    { background: #fff; }

  .btn {
    font-size: 11px;
    padding: 3px 10px;
    border: 1px solid #aaa;
    border-radius: 4px;
    background: #f5f5f5;
    cursor: pointer;
    color: #333;
    margin-left: auto;
  }
  .btn:first-of-type { margin-left: 12px; }
  .btn:hover { background: #e0e0e0; }
</style>
</head>
<body>

<div id="cal"></div>
<div id="footer">
  <div class="legend"><span class="legend-swatch blocked"></span> Blocked</div>
  <div class="legend"><span class="legend-swatch free"></span> Available</div>
  <button class="btn" id="btn-mornings">Block mornings (&lt;9am)</button>
  <button class="btn" id="btn-evenings">Block evenings (&gt;6pm)</button>
  <button class="btn" id="btn-clear">Clear all</button>
</div>

<script>
const DAYS  = ["Mon","Tue","Wed","Thu","Fri"];
const SLOTS = 28; // 7am–9pm in 30-min increments

let blocked      = new Set();
let dragStart    = null;
let dragMode     = null;   // "block" | "unblock"
let lastDragCell = null;
let previewSet   = null;   // cells visually changed during drag, not yet committed

function key(d, s) { return d + "," + s; }

function timeLabel(slot) {
  const h = 7 + Math.floor(slot / 2);
  const m = (slot % 2) * 30;
  const mm = m === 0 ? "00" : "30";
  if (h < 12)  return h + ":" + mm + " am";
  if (h === 12) return "12:" + mm + " pm";
  return (h - 12) + ":" + mm + " pm";
}

function cellEl(d, s) {
  return document.querySelector(`.cell[data-d="${d}"][data-s="${s}"]`);
}

function buildGrid(initBlocked) {
  blocked = new Set((initBlocked || []).map(([d, s]) => key(d, s)));
  const cal = document.getElementById("cal");
  cal.innerHTML = "";

  // Header row
  cal.appendChild(Object.assign(document.createElement("div"), { className: "hdr" }));
  DAYS.forEach(d => {
    cal.appendChild(Object.assign(document.createElement("div"), { className: "hdr", textContent: d }));
  });

  for (let s = 0; s < SLOTS; s++) {
    const isHour = s % 2 === 0;
    const lbl = document.createElement("div");
    lbl.className = "time-lbl" + (isHour ? " hour-start" : "");
    lbl.textContent = isHour ? timeLabel(s) : "";
    cal.appendChild(lbl);

    for (let d = 0; d < 5; d++) {
      const cell = document.createElement("div");
      cell.className = "cell" + (isHour ? " hour-start" : "");
      cell.dataset.d = d;
      cell.dataset.s = s;
      if (blocked.has(key(d, s))) cell.classList.add("blocked");
      cal.appendChild(cell);
    }
  }

  attachEvents();
  sendHeight();
}

function rangeOf(d0, s0, d1, s1) {
  const minD = Math.min(d0,d1), maxD = Math.max(d0,d1);
  const minS = Math.min(s0,s1), maxS = Math.max(s0,s1);
  const out = [];
  for (let d = minD; d <= maxD; d++)
    for (let s = minS; s <= maxS; s++)
      out.push([d, s]);
  return out;
}

function applyPreview(d0, s0, d1, s1) {
  // Reset any cells we painted during the previous preview step
  if (previewSet) {
    previewSet.forEach(([d, s]) => {
      const el = cellEl(d, s);
      if (!el) return;
      if (blocked.has(key(d, s))) el.classList.add("blocked");
      else                        el.classList.remove("blocked");
    });
  }
  previewSet = rangeOf(d0, s0, d1, s1);
  previewSet.forEach(([d, s]) => {
    const el = cellEl(d, s);
    if (!el) return;
    if (dragMode === "block") el.classList.add("blocked");
    else                      el.classList.remove("blocked");
  });
}

function commitRange(d0, s0, d1, s1) {
  rangeOf(d0, s0, d1, s1).forEach(([d, s]) => {
    if (dragMode === "block") blocked.add(key(d, s));
    else                      blocked.delete(key(d, s));
  });
  previewSet = null;
}

function attachEvents() {
  const cal = document.getElementById("cal");

  cal.addEventListener("mousedown", e => {
    const el = e.target.closest(".cell");
    if (!el) return;
    e.preventDefault();
    const d = +el.dataset.d, s = +el.dataset.s;
    dragMode     = blocked.has(key(d, s)) ? "unblock" : "block";
    dragStart    = [d, s];
    lastDragCell = [d, s];
    applyPreview(d, s, d, s);
  });

  cal.addEventListener("mouseover", e => {
    if (!dragStart) return;
    const el = e.target.closest(".cell");
    if (!el) return;
    const d = +el.dataset.d, s = +el.dataset.s;
    if (lastDragCell && lastDragCell[0] === d && lastDragCell[1] === s) return;
    lastDragCell = [d, s];
    applyPreview(dragStart[0], dragStart[1], d, s);
  });

  document.addEventListener("mouseup", e => {
    if (!dragStart) return;
    const el = document.elementFromPoint(e.clientX, e.clientY)?.closest(".cell");
    const endD = el ? +el.dataset.d : dragStart[0];
    const endS = el ? +el.dataset.s : dragStart[1];
    commitRange(dragStart[0], dragStart[1], endD, endS);
    dragStart = null;
    lastDragCell = null;
    sendValue();
  });
}

function rebuildVisual() {
  document.querySelectorAll(".cell").forEach(el => {
    if (blocked.has(key(+el.dataset.d, +el.dataset.s))) el.classList.add("blocked");
    else el.classList.remove("blocked");
  });
}

document.getElementById("btn-mornings").addEventListener("click", () => {
  for (let d = 0; d < 5; d++) for (let s = 0; s < 4; s++) blocked.add(key(d, s));
  rebuildVisual(); sendValue();
});
document.getElementById("btn-evenings").addEventListener("click", () => {
  for (let d = 0; d < 5; d++) for (let s = 22; s < 28; s++) blocked.add(key(d, s));
  rebuildVisual(); sendValue();
});
document.getElementById("btn-clear").addEventListener("click", () => {
  blocked.clear(); rebuildVisual(); sendValue();
});

function sendValue() {
  const out = [];
  blocked.forEach(k => { const [d,s] = k.split(",").map(Number); out.push([d,s]); });
  window.parent.postMessage({ type: "streamlit:setComponentValue", apiVersion: 1, value: out }, "*");
}

function sendHeight() {
  // 29 rows (1 header + 28 slots) × 24px + footer ~48px + 8px padding
  const h = 29 * 24 + 56;
  window.parent.postMessage({ type: "streamlit:setFrameHeight", height: h }, "*");
}

// ── Streamlit component lifecycle ─────────────────────────────────
window.addEventListener("message", e => {
  if (e.data.type === "streamlit:render") {
    buildGrid(e.data.args?.selected || []);
  }
});
window.parent.postMessage({ type: "streamlit:componentReady", apiVersion: 1 }, "*");
</script>
</body>
</html>
